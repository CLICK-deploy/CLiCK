<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>요금제 선택 - CLiCK</title>
  </head>
  <style>
    /* 라이트/다크 모드에 따른 색상 변수 정의 */
    :root {
      --background-color: #ffffff;
      --container-color: #f7f7f8;
      --input-background: #ffffff;
      --text-color: #000000;
      --border-color: rgba(0, 0, 0, 0.1);
      --shadow-color: rgba(0, 0, 0, 0.1);
      --placeholder-color: rgba(0, 0, 0, 0.5);
      --subtext-color: rgba(0, 0, 0, 0.55);
      --card-hover-border: rgba(25, 195, 125, 0.5);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --background-color: #343541;
        --container-color: #444654;
        --input-background: #40414f;
        --text-color: #ffffff;
        --border-color: rgba(255, 255, 255, 0.1);
        --shadow-color: rgba(0, 0, 0, 0.2);
        --placeholder-color: rgba(255, 255, 255, 0.5);
        --subtext-color: rgba(255, 255, 255, 0.55);
        --card-hover-border: rgba(25, 195, 125, 0.6);
      }
    }

    /* 전체 배경 및 폰트 설정 */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
      background-color: var(--background-color);
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      min-height: 100vh;
      margin: 0;
      color: var(--text-color);
      box-sizing: border-box;
      padding: 24px 0;
    }

    /* 폼 컨테이너 스타일 */
    .container {
      background-color: var(--container-color);
      padding: 40px 30px;
      border-radius: 15px;
      box-shadow: 0 4px 15px var(--shadow-color);
      width: 100%;
      max-width: 480px;
      box-sizing: border-box;
      border: 1px solid var(--border-color);
    }

    /* 로고 영역 스타일 */
    .logo-area {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }

    .logo-icon {
      filter: invert(30%) sepia(0%) saturate(0%) hue-rotate(180deg) brightness(50%)
        contrast(100%);
      width: 30px;
      height: 30px;
      margin-right: 5px;
    }

    .logo-text {
      width: 100px;
      height: auto;
    }

    /* 페이지 제목 */
    .page-title {
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-color);
    }

    .page-subtitle {
      text-align: center;
      font-size: 12px;
      color: var(--subtext-color);
      margin-bottom: 24px;
    }

    /* 요금제 카드 영역 */
    .plans-wrapper {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .plan-card {
      border: 1.5px solid var(--border-color);
      border-radius: 10px;
      padding: 16px 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      background-color: var(--input-background);
      position: relative;
    }

    .plan-card:hover {
      border-color: var(--card-hover-border);
      box-shadow: 0 2px 8px var(--shadow-color);
    }

    .plan-card.selected {
      border-color: #19c37d;
      box-shadow: 0 0 0 1px rgba(25, 195, 125, 0.25);
    }

    /* 추천 배지 */
    .plan-badge {
      position: absolute;
      top: -1px;
      right: 16px;
      background-color: #19c37d;
      color: white;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 0 0 8px 8px;
      letter-spacing: 0.03em;
    }

    .plan-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .plan-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-color);
    }

    .plan-price {
      font-size: 14px;
      font-weight: 700;
      color: #19c37d;
    }

    .plan-price .price-unit {
      font-size: 11px;
      font-weight: 400;
      color: var(--subtext-color);
    }

    .plan-features {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .plan-features li {
      font-size: 12px;
      color: var(--subtext-color);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .plan-features li::before {
      content: "";
      display: inline-block;
      width: 14px;
      height: 14px;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="%2319c37d"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>');
      background-size: contain;
      background-repeat: no-repeat;
      flex-shrink: 0;
    }

    /* 선택 라디오 인디케이터 */
    .plan-radio {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .radio-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid var(--border-color);
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .plan-card.selected .radio-dot {
      border-color: #19c37d;
      background-color: #19c37d;
    }

    .radio-dot::after {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: white;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .plan-card.selected .radio-dot::after {
      opacity: 1;
    }

    /* 현재 플랜 - 선택 불가 */
    .plan-card.current-plan {
      cursor: default;
      opacity: 0.55;
      border-color: var(--border-color) !important;
      box-shadow: none !important;
    }

    .plan-card.current-plan:hover {
      border-color: var(--border-color) !important;
      box-shadow: none !important;
    }

    /* 현재보다 낮은 플랜 - 선택 불가 */
    .plan-card.lower-plan {
      cursor: not-allowed;
      opacity: 0.35;
      border-color: var(--border-color) !important;
      box-shadow: none !important;
    }

    .plan-card.lower-plan:hover {
      border-color: var(--border-color) !important;
      box-shadow: none !important;
    }

    .current-plan-badge {
      position: absolute;
      top: -1px;
      left: 16px;
      background-color: var(--subtext-color);
      color: white;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 0 0 8px 8px;
      letter-spacing: 0.03em;
    }

    /* 결제 버튼 */
    .pay-button {
      width: 60%;
      display: block;
      margin: 0 auto;
      padding: 10px;
      background-color: #19c37d;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      line-height: 22px;
      transition: all 0.3s ease;
    }

    .pay-button:hover {
      background-color: #1a8870;
      transform: translateY(-1px);
    }

    .pay-button:disabled {
      background-color: #9ca3af;
      cursor: not-allowed;
      transform: none;
    }

    /* 사용량 요약 섹션 */
    .usage-section {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .usage-card {
      flex: 1;
      background-color: var(--input-background);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .usage-label {
      font-size: 11px;
      color: var(--subtext-color);
      font-weight: 500;
    }

    .usage-amount {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-color);
    }

    .usage-bar-bg {
      height: 5px;
      background-color: var(--border-color);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 2px;
    }

    .usage-bar-fill {
      height: 100%;
      background-color: #19c37d;
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    .usage-plan-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-color);
    }

    .usage-expiry {
      font-size: 11px;
      color: var(--subtext-color);
    }

    .manage-btn {
      margin-top: 6px;
      padding: 4px 10px;
      background: none;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-size: 11px;
      color: var(--subtext-color);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      align-self: flex-end;
      transition: all 0.2s;
    }

    .manage-btn:hover {
      border-color: #19c37d;
      color: #19c37d;
    }

    .usage-skeleton {
      display: inline-block;
      width: 80px;
      height: 12px;
      background: linear-gradient(90deg, var(--border-color) 25%, var(--background-color) 50%, var(--border-color) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
      vertical-align: middle;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* 하단 안내 */
    .footer-note {
      text-align: center;
      font-size: 11px;
      color: var(--subtext-color);
      margin-top: 16px;
    }

    /* 커스텀 알림창 스타일 */
    .custom-alert {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .alert-content {
      background-color: var(--container-color);
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 300px;
      text-align: center;
      box-shadow: 0 4px 15px var(--shadow-color);
      border: 1px solid var(--border-color);
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        transform: translateY(-20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .alert-content p {
      margin: 0 0 20px 0;
      color: var(--text-color);
      font-size: 14px;
    }

    .alert-content button {
      background-color: #19c37d;
      color: white;
      border: none;
      padding: 8px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .alert-content button:hover {
      background-color: #1a8870;
      transform: translateY(-1px);
    }
  </style>

  <body>
    <!-- 커스텀 알림창 -->
    <div id="custom-alert" class="custom-alert">
      <div class="alert-content">
        <p id="alert-message"></p>
        <button type="button" id="alert-close">확인</button>
      </div>
    </div>

    <div class="container">
      <div class="logo-area">
        <img src="../images/icon.png" alt="CLiCK 아이콘" class="logo-icon" />
        <img src="../images/logo.png" alt="CLiCK 로고 텍스트" class="logo-text" />
      </div>

      <p class="page-title">요금제 선택</p>
      <p class="page-subtitle">사용 목적에 맞는 플랜을 선택해주세요.</p>

      <!-- 사용량 요약 섹션 -->
      <div class="usage-section" id="usage-section">
        <div class="usage-card">
          <div class="usage-label">사용된 크레딧</div>
          <div class="usage-amount" id="usage-amount"><span class="usage-skeleton"></span></div>
          <div class="usage-bar-bg">
            <div class="usage-bar-fill" id="usage-bar" style="width: 0%"></div>
          </div>
        </div>
        <div class="usage-card">
          <div class="usage-plan-name" id="usage-plan-name"><span class="usage-skeleton"></span></div>
          <div class="usage-expiry" id="usage-expiry"><span class="usage-skeleton"></span></div>
          <button type="button" class="manage-btn" id="manage-btn">
            ⚙ 구독 관리
          </button>
        </div>
      </div>

      <div class="plans-wrapper">
        <!-- Free 플랜 -->
        <div class="plan-card" id="plan-free" data-plan="free">
          <div class="plan-header">
            <div class="plan-radio">
              <div class="radio-dot"></div>
              <span class="plan-name">Free</span>
            </div>
            <span class="plan-price">₩0 <span class="price-unit">/ 월</span></span>
          </div>
          <ul class="plan-features">
            <li>프롬프트 분석 하루 5회</li>
            <li>추천 프롬프트 기본 제공</li>
          </ul>
        </div>

        <!-- Naive 플랜 -->
        <div class="plan-card" id="plan-naive" data-plan="naive">
          <div class="plan-header">
            <div class="plan-radio">
              <div class="radio-dot"></div>
              <span class="plan-name">Naive</span>
            </div>
            <span class="plan-price">₩1,200 <span class="price-unit">/ 월</span></span>
          </div>
          <ul class="plan-features">
            <li>프롬프트 분석 하루 20회</li>
            <li>추천 프롬프트 기본 제공</li>
          </ul>
        </div>

        <!-- Pro 플랜 -->
        <div class="plan-card" id="plan-pro" data-plan="pro">
          <div class="plan-header">
            <div class="plan-radio">
              <div class="radio-dot"></div>
              <span class="plan-name">Pro</span>
            </div>
            <span class="plan-price">₩9,900 <span class="price-unit">/ 월</span></span>
          </div>
          <ul class="plan-features">
            <li>프롬프트 분석 무제한</li>
            <li>AI 기반 맞춤형 추천 프롬프트</li>
            <li>대화 히스토리 기반 분석</li>
          </ul>
        </div>
      </div>

      <button type="button" class="pay-button" id="pay-button">선택 완료</button>
      <p class="footer-note">언제든지 플랜을 변경하거나 취소할 수 있습니다.</p>
    </div>

    <script src="../asset/js/payment.js"></script>
  </body>
</html>
